version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: diario-postgres-dev
    environment:
      POSTGRES_DB: diario_noticia
      POSTGRES_USER: diario_user
      POSTGRES_PASSWORD: diario_pass
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: diario-redis-dev
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    container_name: diario-minio-dev
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_dev_data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: diario-elasticsearch-dev
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - 'ES_JAVA_OPTS=-Xms256m -Xmx256m'
    ports:
      - '9200:9200'

volumes:
  postgres_dev_data:
  minio_dev_data:
